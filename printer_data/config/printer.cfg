[mcu] #leviathan
canbus_uuid: 7cf14dfcbc8d 
[mcu EBB] # EBB36
canbus_uuid: 8520ac64fefe
[display_status]
[pause_resume]
[include mainsail.cfg]
[exclude_object]
[skew_correction]

##############################################################################
# Basic config
##############################################################################

[printer]
kinematics: corexy
max_velocity: 700  
max_accel: 25000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 15
minimum_cruise_ratio: 0.25

[input_shaper]
shaper_freq_x: 57.2
shaper_freq_y: 46.8
shaper_type_x: mzv
shaper_type_y: mzv

[resonance_tester]
probe_points: 90, 90, 20
accel_chip: adxl345
accel_per_hz: 150 #75

[gcode_arcs]
resolution: 1.0

[adxl345]
cs_pin: EBB: PB12
spi_software_sclk_pin: EBB: PB10
spi_software_mosi_pin: EBB: PB11
spi_software_miso_pin: EBB: PB2
axes_map: x,z,-y #x,y,z

[idle_timeout]
timeout: 900

##############################################################################
# TMC Autotune
##############################################################################

[motor_constants JK35HS52-1504-03F] #dllpdf nema14
resistance: 2.8
inductance: 0.0038
holding_torque: 0.4
max_current: 1.5
steps_per_revolution: 200

#[autotune_tmc stepper_y]
#motor: JK35HS52-1504-03F
#tuning_goal: performance

#[autotune_tmc stepper_x]
#motor: JK35HS52-1504-03F
#tuning_goal: performance

[autotune_tmc stepper_z]
motor: BTT-17H4401S
tuning_goal: silent

[autotune_tmc stepper_z1]
motor: BTT-17H4401S
tuning_goal: silent

[autotune_tmc stepper_z2]
motor: BTT-17H4401S
tuning_goal: silent

[autotune_tmc stepper_z3]
motor: BTT-17H4401S
tuning_goal: silent

##############################################################################
# Gantry
##############################################################################

# Motor B - Left
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 32
microsteps: 32 #16
full_steps_per_rotation:200  
position_min: 0
position_endstop: 180
position_max: 180
homing_positive_dir: true
endstop_pin: PC2
homing_retract_dist: 3
homing_speed: 80  

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
run_current: 0.900
sense_resistor: 0.075
stealthchop_threshold: 0

# Motor A - Right
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 32
microsteps: 32 #16
full_steps_per_rotation:200 
position_min: 0
position_endstop: 180
position_max: 180
homing_positive_dir: true
endstop_pin: EBB:PB6
homing_retract_dist: 3
homing_speed: 80   #Max 100 

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
run_current: 0.900
sense_resistor: 0.075
stealthchop_threshold: 0


##############################################################################
# Z axis
##############################################################################

## Z0 Stepper - Front Left
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 32
gear_ratio: 64:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 150 #160
position_min: -5
homing_speed: 5
second_homing_speed: 2
homing_retract_dist: 5

[tmc2209 stepper_z]
uart_pin: PD5
interpolate: true
run_current: 0.9 #1.000
sense_resistor: 0.110
#stealthchop_threshold: 999999

##  Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 32
gear_ratio: 64:16
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: true
run_current: 0.9 #1.000
sense_resistor: 0.110
#stealthchop_threshold: 999999

##  Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 32
gear_ratio: 64:16
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PA8
interpolate: true
run_current: 0.9 #1.000
sense_resistor: 0.110
#stealthchop_threshold: 999999

##  Z3 Stepper - Front Right
[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7 
rotation_distance: 32
gear_ratio: 64:16
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PG8
interpolate: true
run_current: 0.9 #1.000
sense_resistor: 0.110
#stealthchop_threshold: 999999

##############################################################################
# Extruder
##############################################################################

[extruder]
step_pin: EBB: PD0
dir_pin: EBB: PD1
enable_pin: !EBB: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.669459 #4.637 default for O2
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBB: PA3
control: pid
pid_Kp: 30.726
pid_Ki: 4.016
pid_Kd: 58.764
min_temp: 0
max_temp: 300
pressure_advance: 0.025 #PLA
pressure_advance_smooth_time: 0.03
max_extrude_only_distance: 500
max_extrude_cross_section: 15
max_extrude_only_velocity: 120

[tmc2209 extruder]
uart_pin: EBB: PA15
run_current: 0.75 #LDO calls for 0.85
sense_resistor: 0.11
interpolate: true
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4


[firmware_retraction]
retract_length: 1
retract_speed: 30
unretract_speed: 30

##############################################################################
# Bed
##############################################################################

[heater_bed]
heater_pin: PG11
sensor_pin: PA1 
sensor_type: Generic 3950
pullup_resistor: 2200
max_power: 1
min_temp: 0
max_temp: 125
#control: pid
#pid_kp: 36.977
#pid_ki: 1.813
#pid_kd: 188.581

##############################################################################
# Fans
##############################################################################

[heater_fan Hotend]
pin: EBB: PA0
heater: extruder
heater_temp: 60.0

[fan]
pin: EBB: PA1

[fan_generic filter]
pin: PG10
kick_start_time: 0.5
off_below: 0.13
cycle_time: 0.010

[multi_pin electronics_fans]
pins: PB7, PB3, PF7, PF9


[controller_fan Electronics]
pin: multi_pin:electronics_fans
stepper: stepper_y, stepper_x, stepper_z, stepper_z1, stepper_z2, stepper_z3
idle_timeout: 30
max_power: 0.75
kick_start_time: 0.5
cycle_time: 0.010


##############################################################################
# Lights
##############################################################################

[output_pin daylight]
pin: PE6
pwm:true
hardware_pwm: False
shutdown_value: 0
cycle_time: 0.00025

## Neopixel (Optional)
## Connected to NEOPIXEL
[neopixel glow]
pin: PF10
chain_count: 6
color_order: GRB
initial_RED: 0.2
initial_GREEN: 0.0
initial_BLUE: 0.5

##############################################################################
# Thermistors
##############################################################################

[temperature_sensor Chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2
pullup_resistor: 2200

[temperature_sensor Electronics]
sensor_type: Generic 3950
sensor_pin: PA0
pullup_resistor: 2200

[temperature_sensor RPI]
sensor_type: temperature_host

#[temperature_sensor MCU]
#sensor_type: temperature_mcu
#sensor_mcu: mcu
#max_temp: 100

[temperature_sensor EBB]
sensor_type: temperature_mcu
sensor_mcu: EBB

#####################################################################
#   Probe
#####################################################################

[probe]
pin: EBB: PB5
x_offset: 0
y_offset: 0
#z_offset: 0    # Suggested to tune yourself
speed: 5
samples: 3
samples_result: median
sample_retract_dist: 5
samples_tolerance: 0.010
samples_tolerance_retries: 3

#TAP settings;
activate_gcode:
    {% set PROBE_TEMP = 140 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be too hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

[quad_gantry_level]
#  Gantry Corners
gantry_corners:
   -60.5,-8.9
   234.5,244.1
#  Probe points
points:
   5,5
   5,175
   175,175
   175,5
speed: 200
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.015
max_adjust: 5

[safe_z_home]
home_xy_position: 90,90
speed:150
z_hop:5
    
[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 10, 10
mesh_max: 170, 170
probe_count: 5,5
algorithm: bicubic
zero_reference_position: 90,90

[axis_twist_compensation]
#speed: 50
#horizontal_move_z: 5
calibrate_start_x: 10
calibrate_end_x: 170
calibrate_y: 90

[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
# number_of_results_to_keep: 3
# keep_raw_data: False
# show_macros_in_webui: True
# timeout: 600
# measurements_chunk_size: 2
# max_freq: 200
# dpi: 300

#####################################################################
#   Macros
#####################################################################

[gcode_macro Lights_on]
gcode:
  SET_PIN PIN=daylight VALUE=1.00

[gcode_macro Lights_off]
gcode:
  SET_PIN PIN=daylight VALUE=0

[gcode_macro Lights_dim]
gcode:
  SET_PIN PIN=daylight VALUE=0.25

[gcode_macro Lights_verydim]
gcode:
  SET_PIN PIN=daylight VALUE=0.1


[gcode_macro PRINT_START]
gcode:
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("40")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  
  G28                                                   # Full home (XYZ)
  G90                                                   # Absolute position

  # Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
  {% if params.BED|int > 90 %}
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_FAN_SPEED FAN=filter SPEED=1                      # Turn on the filter/bedfans
    M109 S140                                           # Heat hotend to 140
    M106 S150                                           # Turn on the PT-fan
    TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={target_chamber}   # Waits for chamber temp

  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak
  {% else %}
    G1 X{x_wait} Y{y_wait} Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
  {% endif %}
  M109 S140                                             # Heat hotend to 140c
  QUAD_GANTRY_LEVEL                                    # Level the printer via QGL
  G28 Z                                                # Home Z again after QGL
  BED_MESH_PROFILE LOAD=default                        #load default mesh
  SKEW_PROFILE LOAD=my_skew_profile                    #load skew correction
  #BED_MESH_CALIBRATE                                   # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh
  G1 X{x_wait} Y{y_wait} Z15 F9000                      # Go to center of the bed
  M107                                                  # Turn off partcooling fan
  M109 S{target_extruder}                               # Heat the hotend to set temp
  G0 X{x_wait - 50} Y4 F10000                           # Go to starting point
  G0 Z0.4                                               # Raise Z to 0.4
  G91                                                   # Incremental positioning 
  G1 X100 E20 F1000                                     # Primeline
  G90                                                   # Absolute position

[gcode_macro PRINT_END]
gcode:
    M400                           ; wait for buffer to clear
    TURN_OFF_HEATERS
    G92 E0                         ; zero the extruder
    G1 E-10.0 F1500                ; retract filament
    G91                            ; relative positioning
    G0 Z1.00 #X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    M107                           ; turn off fan
    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G28 X Y                        ; home x and y, back corner
    #BED_MESH_CLEAR
    UPDATE_DELAYED_GCODE ID=filter_off DURATION=600  ; Run Nevermore for ten minutes to clear fumes

[delayed_gcode filter_off]
gcode:
    SET_FAN_SPEED FAN=filter SPEED=0

[gcode_macro TOGGLE_FILTER]
gcode:
    {% if printer['fan_generic filter'].speed > 0 %}
      SET_FAN_SPEED FAN=filter SPEED=0
    {% else %}
      SET_FAN_SPEED FAN=filter SPEED=1
    {% endif %}

[display_status]

[pause_resume]

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  #TURN_OFF_HEATERS
  PRINT_END
  CANCEL_PRINT_BASE

[gcode_macro LOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E65 F1000                    ; load
   G1 E50 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E15 F300                    ; extrude a little to soften tip
   G1 E-70 F1000                  ; retract some, but not too much or it will jam
   M82                            ; set extruder to absolute

[gcode_macro Heatsoak]
gcode:
    G28
    G1 Z15
    G1 Y90 F6000
    G1 X90 F6000
    #SET_PRESSURE_ADVANCE ADVANCE=0.02 #ABS PA value
    M104 S140 ;set extruder to 150c
    M190 S110 ;wait for bed to reach 110c
    SET_FAN_SPEED FAN=filter SPEED=0.90 ;turn on nevermore fan 90%
    M106 S128 ;turn on part fans 50%
     SET_IDLE_TIMEOUT TIMEOUT=1800 ;set 30min timeout

[gcode_macro TEST_SPEED]
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU

gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = printer.toolhead.axis_minimum.y + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED

